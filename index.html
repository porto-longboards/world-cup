const fdt=dt=>new Date(dt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const isToday=dt=>{const d=new Date(dt),n=new Date();return d.toDateString()===n.toDateString()};
const isTomorrow=dt=>{const d=new Date(dt),n=new Date();n.setDate(n.getDate()+1);return d.toDateString()===n.toDateString()};
const aberto=j=>!resultados[j.id]&&new Date(j.dt)>new Date();
const enc=j=>!!resultados[j.id];
const placar=jid=>resultados[jid]||null;
const pal=(jid,pid)=>palpites[jid+'_'+pid]||null;

function deadlineStr(dt){
  const diff=new Date(dt)-new Date();
  if(diff<=0)return '';
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  const hBr=dt.slice(11,16);
  if(h<1)return`<div class="deadline urgent">⚠️ Fecha em ${m}min — aposte até às ${hBr}</div>`;
  if(h<3)return`<div class="deadline warn">⏰ Fecha em ${h}h${m?m+'min':''} — até às ${hBr}</div>`;
  return`<div class="deadline ok">🕐 Aposte até às ${hBr} (Brasília)</div>`;
}

// ── SCORING ───────────────────────────────────────────────────────────────
function calcPtsNovo(pid){
  let pts=0;
  const breakdown={};
  allJogos().forEach(j=>{
    const pl=placar(j.id);
    if(!pl)return;
    const pa=pal(j.id,pid);
    if(!pa){breakdown[j.id]={pts:0,reason:'Sem palpite'};return;}
    const rv=pl.g1>pl.g2?1:(pl.g1<pl.g2?-1:0);
    const pv=pa.g1>pa.g2?1:(pa.g1<pa.g2?-1:0);
    let p=0,reason='';
    if(pa.g1===pl.g1&&pa.g2===pl.g2){p=10;reason='Placar exato ⭐';}
    else if(rv!==0&&pv===rv){
      const wok=(rv===1&&pa.g1===pl.g1)||(rv===-1&&pa.g2===pl.g2);
      if(wok){p=6;reason='Vencedor + gols 🎯';}
      else{p=4;reason='Vencedor certo ✅';}
    }else if(rv===0&&pv===0){p=4;reason='Empate certo 🤝';}
    else{p=0;reason='Errou ❌';}
    pts+=p;
    breakdown[j.id]={pts:p,reason,pa,pl};
  });
  return{pts,breakdown};
}

function techScore(pa,pl){
  if(!pa)return{pts:0,reason:'Sem palpite'};
  const rv=pl.g1>pl.g2?1:(pl.g1<pl.g2?-1:0);
  const pv=pa.g1>pa.g2?1:(pa.g1<pa.g2?-1:0);
  if(pa.g1===pl.g1&&pa.g2===pl.g2)return{pts:10,reason:'Placar exato ⭐'};
  if(rv!==0&&pv===rv){
    const wok=(rv===1&&pa.g1===pl.g1)||(rv===-1&&pa.g2===pl.g2);
    return wok?{pts:6,reason:'Vencedor + gols 🎯'}:{pts:4,reason:'Vencedor certo ✅'};
  }
  if(rv===0&&pv===0)return{pts:4,reason:'Empate certo 🤝'};
  return{pts:0,reason:'Errou ❌'};
}

async function readCSV(gid){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&_=${Date.now()}`;
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),8000);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)throw new Error('CSV '+r.status);
    const text=await r.text();
    const rows=[];
    for(const line of text.trim().split(/\r?\n/)){
      const cells=[],len=line.length;
      let cur='',inQ=false;
      for(let i=0;i<len;i++){
        const ch=line[i];
        if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
        else if(ch===','&&!inQ){cells.push(cur.trim());cur='';}
        else cur+=ch;
      }
      cells.push(cur.trim());
      rows.push(cells);
    }
    return rows.slice(1);
  }catch(e){clearTimeout(tid);return[];}
}

async function writeRow(sheet,key,values){
  const params=new URLSearchParams({action:'write',sheet,key,v:JSON.stringify([key,...values]),_:Date.now()});
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),12000);
  try{
    const r=await fetch(`${GS_URL}?${params}`,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)throw new Error('Write '+r.status);
  }catch(e){clearTimeout(tid);throw e;}
}

async function loadAll(){
  const [rRows,pRows]=await Promise.all([readCSV(GIDS.resultados),readCSV(GIDS.palpites)]);
  const r={};
  rRows.forEach(row=>{if(row[0]&&row[1]!==''&&row[2]!=='')r[row[0]]={g1:+row[1],g2:+row[2]};});
  resultados=r;
  const p={};
  pRows.forEach(row=>{if(row[0]&&row[1]!==''&&row[2]!=='')p[row[0]]={g1:+row[1],g2:+row[2]};});
  palpites=p;
}

// ── ESPN LIVE ─────────────────────────────────────────────────────────────
function norm(s){
  return(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'')
    .replace(/united states.*/g,'usa').replace(/türkiye|turkiye/g,'turkiye')
    .replace(/ivory coast|cote d ivoire/g,'ivory coast')
    .replace(/bosnia.*/g,'bosnia').trim();
}

async function fetchLive(){
  try{
    const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?_='+Date.now());
    if(!r.ok)return;
    const d=await r.json();
    const ns={};
    (d.events||[]).forEach(ev=>{
      (ev.competitions||[]).forEach(comp=>{
        const teams=comp.competitors||[];
        if(teams.length<2)return;
        const h=teams.find(t=>t.homeAway==='home'),a=teams.find(t=>t.homeAway==='away');
        if(!h||!a)return;
        const st=comp.status?.type?.name||'';
        const completed=st==='STATUS_FINAL',live=st==='STATUS_IN_PROGRESS'||st==='STATUS_HALFTIME';
        if(!completed&&!live)return;
        const hn=h.team?.displayName||'',an=a.team?.displayName||'';
        const jogo=allJogos().find(j=>
          (norm(j.t1)===norm(hn)&&norm(j.t2)===norm(an))||
          (norm(j.t1)===norm(an)&&norm(j.t2)===norm(hn))
        );
        if(jogo){
          const isH=norm(jogo.t1)===norm(hn);
          ns[jogo.id]={g1:isH?+h.score:+a.score,g2:isH?+a.score:+h.score,live,completed,clock:comp.status?.displayClock||''};
          return;
        }
        // Knockout stage detection
        const isTBD=s=>!s||/tbd|winner|loser/i.test(s);
        if(isTBD(hn)||isTBD(an))return;
        const t1In=JJ.some(j=>norm(j.t1)===norm(hn)||norm(j.t2)===norm(hn));
        const t2In=JJ.some(j=>norm(j.t1)===norm(an)||norm(j.t2)===norm(an));
        if(t1In&&t2In)return; // group stage teams playing each other = duplicate
        const espnId='espn_'+ev.id;
        if(!knockoutJogos.find(j=>j.id===espnId)){
          const evDate=ev.date||'';
          const dtStr=evDate?new Date(evDate).toLocaleString('sv-SE',{timeZone:'America/Sao_Paulo'}).replace(' ','T').slice(0,16):'';
          const noteText=(comp.notes||[])[0]?.headline||ev.name||'Fase Eliminatória';
          const fase=noteText.includes('Final')&&!noteText.includes('Semi')&&!noteText.includes('Quarter')?'Final 🏆':noteText.includes('Semi')?'Semifinal':noteText.includes('Quarter')?'Quartas':noteText.includes('16')?'Oitavas':'Fase Eliminatória';
          if(dtStr)knockoutJogos.push({id:espnId,t1:hn,t2:an,fase,dt:dtStr,fromESPN:true});
        }
        ns[espnId]={g1:+h.score,g2:+a.score,live,completed,clock:comp.status?.displayClock||''};
      });
    });
    liveScores=ns;
  }catch(e){}
}

      <div class="team"><div class="tf">${f(j.t1)}</div><div class="tn">${pt(j.t1)}</div></div>
      ${scoreHtml}
      <div class="team"><div class="tf">${f(j.t2)}</div><div class="tn">${pt(j.t2)}</div></div>
    </div></div>
    ${footer}
  </div>`;
}

async function salvarPal(jid,pid){
  const v1=document.getElementById('p1_'+jid),v2=document.getElementById('p2_'+jid);
  if(!v1||!v2||v1.value===''||v2.value===''){toast('Preencha os dois placares!');return;}
  const j=allJogos().find(x=>x.id===jid);
  if(!j||!aberto(j)){toast('Jogo já iniciado — palpite bloqueado! 🔒');return;}
  const btn=document.getElementById('btn_'+jid);
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  isSaving=true;
  const key=jid+'_'+pid;
  palpites[key]={g1:+v1.value,g2:+v2.value};
  try{
    await writeRow('palpites',key,[+v1.value,+v2.value]);
    toast('Palpite salvo! ✓');
    renderTab();
  }catch(e){
    toast('Erro ao salvar — tente novamente');
    if(btn){btn.disabled=false;btn.textContent='Salvar';}
  }
  isSaving=false;
}

// ── RANKING ───────────────────────────────────────────────────────────────
function renderRanking(){
  const rank=PP.map(p=>{
    const novo=calcPtsNovo(p.id);
    const acertos=allJogos().filter(j=>{const pl=placar(j.id);if(!pl)return false;const pa=pal(j.id,p.id);return pa&&pa.g1===pl.g1&&pa.g2===pl.g2;}).length;
    return{...p,pts:novo.pts,acertos};
  }).sort((a,b)=>b.pts-a.pts);

  const pos=['🥇','🥈','🥉'];
  let html=`<div class="sec">Classificação</div>
  <div class="card" style="padding:10px 14px;margin-bottom:10px;background:#fffbf0;border-color:#e8d98a;font-size:12px;color:#4a4a47;line-height:2">
    ⭐ <strong>10pts</strong> Placar exato &nbsp;·&nbsp;
    🎯 <strong>6pts</strong> Vencedor + gols do vencedor &nbsp;·&nbsp;
    ✅ <strong>4pts</strong> Vencedor certo &nbsp;·&nbsp;
    🤝 <strong>4pts</strong> Empate certo &nbsp;·&nbsp;
    ❌ <strong>0pts</strong> Errou
  </div>
  <div class="cf">`;

  rank.forEach((p,i)=>{
    const hl=curPart&&p.id===curPart;
    html+=`<div class="rr${hl?' hl':''}">
      <div style="width:26px;text-align:center;font-size:15px">${i<3?pos[i]:`${i+1}º`}</div>
      ${av(p,false)}
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;color:#1a1a18">${p.n}${hl?` <span style="font-size:11px;color:var(--green);font-weight:400">(você)</span>`:''}</div>
        <div style="font-size:11px;color:#4a4a47">${p.acertos} placar${p.acertos!==1?'es':''} exato${p.acertos!==1?'s':''}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:700;color:#856404">${p.pts}</div>
        <div style="font-size:11px;color:#4a4a47">pontos</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('tab-ranking').innerHTML=html;
}

// ── RESULTADOS ────────────────────────────────────────────────────────────
function renderResultados(){
  const passados=[...allJogos()].filter(j=>enc(j)).sort((a,b)=>new Date(b.dt)-new Date(a.dt));
  let html=`<div class="sec">Jogos encerrados (${passados.length})</div>`;

  if(!passados.length){
    html+=`<div style="text-align:center;color:#4a4a47;padding:30px;font-size:14px">Nenhum resultado ainda.</div>`;
  }else{
    passados.forEach(j=>{
      const pl=placar(j.id);
      html+=cardJogo(j,false);
      // Technical breakdown
      const scores=PP.map(p=>{
        const pa=pal(j.id,p.id);
        const sc=techScore(pa,pl);
        return{p,sc,pa};
      }).sort((a,b)=>b.sc.pts-a.sc.pts);
      html+=`<div class="card" style="margin-top:-8px;margin-bottom:12px;border-radius:0 0 var(--r) var(--r);padding:10px 14px;background:#fafaf8;border-top:none">
        <div style="font-size:11px;font-weight:700;color:#4a4a47;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Pontuação técnica</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${scores.map(({p,sc,pa})=>`
            <div style="display:flex;align-items:center;gap:8px">
              ${av(p,false)}
              <div style="flex:1">
                <span style="font-size:13px;font-weight:700;color:#1a1a18">${p.n}</span>
                <span style="font-size:12px;color:#4a4a47;margin-left:6px">${pa?pa.g1+'–'+pa.g2:'—'}</span>
              </div>
              <div style="text-align:right">
                <span style="font-size:14px;font-weight:700;color:${sc.pts>=6?'var(--green)':sc.pts>=4?'#856404':'#4a4a47'}">${sc.pts}pts</span>
                <div style="font-size:10px;color:#4a4a47">${sc.reason}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    });
  }
  document.getElementById('tab-resultados').innerHTML=html;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function renderAdmin(){
  const by=(arr)=>[...arr].sort((a,b)=>new Date(a.dt)-new Date(b.dt));
  const emAnd=by(allJogos().filter(j=>!enc(j)&&!aberto(j)));
  const prox=by(allJogos().filter(j=>aberto(j))).slice(0,8);
  const encerrados=[...allJogos()].filter(j=>enc(j)).sort((a,b)=>new Date(b.dt)-new Date(a.dt));

  let html=`<div class="alert ag">📊 Resultados: edite a aba <strong>resultados</strong> na planilha. O site atualiza em ~45s.</div>
  <button class="btn btng" style="width:100%;margin-bottom:14px" onclick="window.open('https://docs.google.com/spreadsheets/d/${SHEET_ID}','_blank')">📋 Abrir planilha</button>`;

  if(emAnd.length){
    html+=`<div class="sec">Jogos em andamento</div><div class="cf">`;
    emAnd.forEach(j=>{
      const lv=liveScores[j.id];
      html+=`<div style="padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:#1a1a18">${f(j.t1)} ${pt(j.t1)} vs ${pt(j.t2)} ${f(j.t2)}</div>
          <div style="font-size:11px;color:#4a4a47">${fdt(j.dt)}</div>
          ${lv?`<div style="font-size:11px;color:#a32d2d;margin-top:2px">🔴 ESPN: ${lv.g1}–${lv.g2}${lv.live?' (ao vivo)':' (final)'}</div>`:''}
        </div>
        ${lv&&lv.completed?`<button class="btn btng bsm" id="btn_reg_${j.id}" onclick="registrarESPN('${j.id}',${lv.g1},${lv.g2})">✓ ${lv.g1}–${lv.g2}</button>`:''}
      </div>`;
    });
    html+=`</div>`;
  }else{
    html+=`<div class="alert ab">Nenhum jogo em andamento agora.</div>`;
  }

  if(encerrados.length){
    html+=`<div class="sec">Resultados registrados</div><div class="cf">`;
    encerrados.slice(0,10).forEach(j=>{
      const pl=placar(j.id);
      html+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;font-weight:600;color:#1a1a18">${f(j.t1)} ${pt(j.t1)} vs ${pt(j.t2)} ${f(j.t2)}</div>
        <span style="font-size:15px;font-weight:700;color:#1a1a18">${pl.g1}–${pl.g2}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  if(prox.length){
    html+=`<div class="sec">Próximos jogos</div><div class="cf">`;
    prox.forEach(j=>{
      const n=PP.filter(p=>pal(j.id,p.id)).length;
      html+=`<div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:13px;font-weight:600;color:#1a1a18">${f(j.t1)} ${pt(j.t1)} vs ${pt(j.t2)} ${f(j.t2)}</div>
          <div style="font-size:11px;color:#4a4a47">${fdt(j.dt)}</div>
        </div>
        <span class="badge bg">${n}/7 palpitaram</span>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="sec">Configurações</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn bsm" onclick="trocar()">Trocar participante</button>
    <button class="btn bsm" onclick="forceRefresh()">↻ Atualizar</button>
    <button class="btn bsm" onclick="debugData()">🔍 Debug</button>
  </div>`;

  document.getElementById('tab-admin').innerHTML=html;
}

async function registrarESPN(jid,g1,g2){
  if(!confirm(`Confirmar ${g1}–${g2}?`))return;
  const btn=document.getElementById('btn_reg_'+jid);
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  isSaving=true;
  resultados[jid]={g1,g2};
  try{
    await writeRow('resultados',jid,[g1,g2]);
    toast('Resultado registrado! ✓');
    renderTab();
  }catch(e){
    toast('Erro — edite na planilha');
    if(btn){btn.disabled=false;btn.textContent=`✓ ${g1}–${g2}`;}
  }
  isSaving=false;
}

async function forceRefresh(){
  toast('Atualizando...');
  try{await loadAll();await fetchLive();renderTab();toast('Atualizado!');}
  catch(e){toast('Erro ao atualizar');}
}

async function debugData(){
  await loadAll();
  const rk=Object.keys(resultados),pk=Object.keys(palpites);
  let msg=`RESULTADOS (${rk.length}):\n`;
  rk.forEach(k=>{const v=resultados[k];msg+=`${k}: ${v.g1}-${v.g2}\n`;});
  msg+=`\nPALPITES (${pk.length}):\n`;
  pk.slice(0,8).forEach(k=>msg+=`${k}: ${palpites[k].g1}-${palpites[k].g2}\n`);
  msg+=`\nGIDs: resultados=${GIDS.resultados} palpites=${GIDS.palpites}`;
  alert(msg);
}

let tt;
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m;
  el.classList.add('show');
  clearTimeout(tt);
  tt=setTimeout(()=>el.classList.remove('show'),3000);
}

boot();
</script>
